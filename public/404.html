    <!-- 主题初始化脚本（在页面渲染前立即应用，避免闪烁） -->
    <script>
      ;(function () {
        // 主题模式常量
        const THEME_MODES = {
          LIGHT: 'light',
          DARK: 'dark',
          SYSTEM: 'system',
          AUTO: 'auto',
        }
        const THEMES = {
          LIGHT: 'light',
          DARK: 'dark',
        }

        // 根据时间判断应该使用的主题（6:00-18:00 浅色，其他深色）
        function getThemeByTime() {
          const hour = new Date().getHours()
          return hour >= 6 && hour < 18 ? THEMES.LIGHT : THEMES.DARK
        }

        // 根据系统偏好判断主题
        function getThemeBySystem() {
          if (typeof window !== 'undefined' && window.matchMedia) {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? THEMES.DARK : THEMES.LIGHT
          }
          return THEMES.LIGHT
        }

        // 根据模式计算实际主题
        function computeTheme(mode) {
          switch (mode) {
            case THEME_MODES.LIGHT:
              return THEMES.LIGHT
            case THEME_MODES.DARK:
              return THEMES.DARK
            case THEME_MODES.SYSTEM:
              return getThemeBySystem()
            case THEME_MODES.AUTO:
              return getThemeByTime()
            default:
              return getThemeBySystem()
          }
        }

        function applyTheme(theme) {
          document.documentElement.setAttribute('data-theme', theme)
          document.documentElement.style.colorScheme = theme

          const themeColorMeta = document.querySelector('meta[name="theme-color"]')
          if (themeColorMeta) {
            themeColorMeta.setAttribute('content', theme === THEMES.DARK ? '#0f0f1a' : '#6366f1')
          }
        }

        // 读取用户保存的主题模式
        let savedMode = null
        let legacyTheme = null
        try {
          savedMode = localStorage.getItem('wallpaper-gallery-theme-mode')
          legacyTheme = localStorage.getItem('wallpaper-gallery-theme')
        } catch (e) {
          // localStorage 可能不可用（如隐私模式）
        }

        // 确定主题模式（默认跟随系统，兼容旧版手动 light/dark 存储）
        const themeMode =
          savedMode && Object.values(THEME_MODES).includes(savedMode)
            ? savedMode
            : legacyTheme && Object.values(THEMES).includes(legacyTheme)
              ? legacyTheme
              : THEME_MODES.SYSTEM

        // 计算并应用主题
        const theme = computeTheme(themeMode)
        applyTheme(theme)
      })()
    </script>
